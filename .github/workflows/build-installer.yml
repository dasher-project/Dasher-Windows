name: Build Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  DASHERCORE_REF: 'feature-CAPI'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/v(.+)') {
            $ver = $Matches[1]
            # Ensure 4-part version for MSI (x.y.z.w)
            $parts = ($ver -split '\.').Count
            if ($parts -lt 4) { $ver = "$ver.0" * (4 - $parts + 1) }
            # Actually just pad to 4 parts properly
            $vp = $ver -split '\.'
            while ($vp.Count -lt 4) { $vp += '0' }
            $ver = $vp -join '.'
            Write-Host "MSI version: $ver"
            echo "msi=$ver" >> $env:GITHUB_OUTPUT
            echo "msix=$($Matches[1])" >> $env:GITHUB_OUTPUT
          } else {
            echo "msi=0.0.1.0" >> $env:GITHUB_OUTPUT
            echo "msix=0.0.1" >> $env:GITHUB_OUTPUT
          }
      - name: Checkout Dasher-Windows
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build DasherCore DLL
        working-directory: native
        run: |
          cmake -B build -G Ninja -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Copy dasher.dll to project
        run: |
          Copy-Item native/build/bin/dasher.dll src/Dasher.Windows/dasher.dll -Force

      - name: Publish app (self-contained, win-x64)
        run: dotnet publish src/Dasher.Windows/Dasher.Windows.csproj -c Release -r win-x64 --self-contained -o publish/app

      - name: Copy DasherCore data files
        run: |
          Copy-Item -Recurse DasherCore/Data publish/app/Data

      # ── MSI (classic installer) ──────────────────────────────────────────────

      - name: Install WiX v5
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build MSI
        working-directory: installer
        run: |
          wix build dasher.wxs -o ../publish/Dasher-Windows.msi `
            -d AppSource="../publish/app" `
            -d Version="${{ steps.version.outputs.msi }}"

      # ── MSIX (app package with self-signed cert for sideloading) ─────────────

      - name: Build MSIX
        run: |
          pwsh -ExecutionPolicy Bypass -File installer/build-msix.ps1 `
            -AppSource "$(pwd)/publish/app" `
            -Version "${{ steps.version.outputs.msix }}.0" `
            -OutputDir "$(pwd)/publish"

      # ── Artifacts (every build) ──────────────────────────────────────────────

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: Dasher-Windows-MSI
          path: publish/Dasher-Windows.msi

      - name: Upload MSIX
        uses: actions/upload-artifact@v4
        with:
          name: Dasher-Windows-MSIX
          path: |
            publish/Dasher-Windows.msix
            publish/DasherTesting.cer

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: Dasher-Windows-Portable
          path: publish/app/

      # ── GitHub Release (tags only) ───────────────────────────────────────────

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            publish/Dasher-Windows.msi
            publish/Dasher-Windows.msix
            publish/DasherTesting.cer
